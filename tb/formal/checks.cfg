
[options]
isa rv32i
solver yices

[depth]
insn            10
reg       10    15
pc_bwd    10    20
unique    1  10 20
causal    10    20
csrw            20

[sort]
reg_ch0

[csrs]

[defines]
`define RVFI
`define RVFI_TRACE
`define RISCV_FORMAL
`define RISCV_FORMAL_NRET 1
`define RISCV_FORMAL_XLEN 32
`define RISCV_FORMAL_ILEN 32
`define RISCV_FORMAL_ALIGNED_MEM
`define RISCV_FORMAL_CSR_MSTATUS
`define RISCV_FORMAL_CSR_MIE
`define RISCV_FORMAL_CSR_MIP
`define RISCV_FORMAL_CSR_MTVEC
`define RISCV_FORMAL_CSR_MEPC
`define RISCV_FORMAL_CSR_MCAUSE
`define RISCV_FORMAL_CSR_MTVAL
`define RISCV_FORMAL_CSR_MSCRATCH


[defines liveness]
`define RVJ1_FAIRNESS


[script-sources]
plugin -i slang
read_slang -D RVFI --top rvj1_top --compat-mode --keep-hierarchy --allow-use-before-declare -F /foss/designs/rvj1/tb/formal/formal.flist
read_verilog -sv /foss/designs/rvj1/tb/formal/rvfi_wrapper.sv

