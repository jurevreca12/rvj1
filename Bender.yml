    - rtl/rvj1_dec.sv
    - rtl/rvj1_ifu.sv
    - rtl/rvj1_lsu.sv
    - rtl/rvj1_regfile.sv
    - rtl/rvj1_top.sv

    - target: sim
      files:
            - tb/support/bytewrite_sram.sv
            - tb/support/bytewrite_sram_wrap.sv
            - tb/support/ifu_mem_test_top.sv
            - tb/support/lsu_mem_test_top.sv
            - tb/support/rvj1_test_top.sv
            - tb/riscof-plugin/tb/rvj1_riscof_tb.sv
