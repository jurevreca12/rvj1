package:
  name: rvj1
  authors:
    - "Jure Vreča <jure.vreca@ijs.si>"

dependencies:
  std-lib:    { git: "https://github.com/jurevreca12/std-lib.git",     rev: b18287e }
  mapped2obi: { git: "https://github.com/jurevreca12/mapped2obi.git",  rev: 06411af }
  riscv-dbg:  { git: "https://github.com/pulp-platform/riscv-dbg.git", rev: 1cd764a, target: sim}
  obi:        { git: "https://github.com/Kristjan42/obi.git",          rev: 7c895da, target: sim}

export_include_dirs:
  - rtl/inc/

sources:
    - rtl/alu/compare/less_than_sign_Nb.sv
    - rtl/alu/compare/less_than_unsign_Nb.sv
    - rtl/rvj1_pkg.sv
    - rtl/rvfi_trace.sv
    - rtl/rvj1_alu.sv
    - rtl/rvj1_branch.sv
    - rtl/rvj1_ctrl.sv
    - rtl/rvj1_csr.sv
    - rtl/rvj1_dec.sv
    - rtl/rvj1_ifu.sv
    - rtl/rvj1_lsu.sv
    - rtl/rvj1_regfile.sv
    - rtl/rvj1_top.sv
    - rtl/rvj1_obi.sv

    - target: sim
      files:
            - tb/support/bytewrite_sram_1w1r.sv
            - tb/support/bytewrite_sram_wrap.sv
            - tb/support/ifu_mem_test_top.sv
            - tb/support/lsu_mem_test_top.sv
            - tb/support/rvj1_test_top.sv
            - tb/support/rvj1_cosim_top.sv
            - tb/riscof-plugin/tb/rvj1_riscof_tb.sv
