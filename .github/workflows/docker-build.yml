name: Build-Docker-Image

on:
  push:
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
         context: .
         tags: iic-osic-tools-plus:latest
         outputs: type=docker,dest=${{ runner.temp }}/iic-osic-tools-plus.tar
         cache-from: type=gha
         cache-to: type=gha,moda=max
      - uses: actions/upload-artifact@v4
        with:
          name: myimg
          path: ${{ runner.temp }}/iic-osic-tools-plus.tar
          retention-days: 7
