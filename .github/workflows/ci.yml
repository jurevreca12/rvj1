name: CI

on:
    push:
    pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
         context: .
         push: false
         tags: iic-osic-tools-plus:latest
      - name: Run RISCOF Tests
        run: |
         export CUID=id -u
         export CGID=id -g
         docker run --user ${CUID}:${CGID} \
                    -e "UID=${CUID}" \
                    -e "GID=${CGID}" \
                    -v /etc/group:/etc/group:ro \
                    -v /etc/passwd:/etc/passwd:ro \
                    -v ~/.cache/:/headless/.cache:rw \
                    -v $PWD:/foss/designs/rvj1 \
                    iic-osic-tools-plus:latest \
                    -s make test
