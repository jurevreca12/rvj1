name: CI

on:
    push:
    pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
         context: .
         push: false
         tags: iic-osic-tools-plus:latest
      - name: Start Docker
        run: |
          make docker-run-it
      - name: Run RISCOF Tests
        run: |
         cd tb 
         make riscof
